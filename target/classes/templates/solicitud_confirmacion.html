<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<th:block th:insert="~{layout/header}"></th:block>

<head><title>SIGS — Solicitud Registrada</title></head>
<body>

<div class="page-header">
  <h1><i class="bi bi-check-circle-fill me-2" style="color:var(--color-success-lt)"></i>Solicitud Registrada</h1>
  <p>La solicitud ha sido guardada exitosamente en el sistema.</p>
</div>

<!-- Barra de pasos -->
<div class="steps-bar mb-4">
  <div class="step-item done"><div class="step-number"><i class="bi bi-check-lg"></i></div> Datos del Deudo</div>
  <div class="step-item active"><div class="step-number">2</div> Datos del Fallecido</div>
  <div class="step-item"><div class="step-number">3</div> Comprobante</div>
</div>

<!-- Confirmación -->
<div class="card mb-4">
  <div class="card-header-custom" style="background: linear-gradient(135deg,rgba(72,187,120,.12),rgba(72,187,120,.05));">
    <div class="card-header-icon" style="background:rgba(72,187,120,.15); color:var(--color-success-lt);">
      <i class="bi bi-clipboard2-check-fill"></i>
    </div>
    <h5 style="color:var(--color-success)">Comprobante de Solicitud</h5>
  </div>
  <div class="card-body-custom">
    <div class="row g-4">
      <div class="col-md-3 text-center">
        <div style="font-size:.75rem; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); font-weight:600;">N° de Solicitud</div>
        <div style="font-size:2.2rem; font-weight:800; color:var(--color-accent);"
             th:text="${solicitud.idSolicitud}">#</div>
      </div>
      <div class="col-md-9">
        <div class="row g-3">
          <div class="col-md-6">
            <div class="comprobante-field">
              <label>Nombre del Deudo</label>
              <span th:text="${solicitud.nombreDeudo}">-</span>
            </div>
          </div>
          <div class="col-md-3">
            <div class="comprobante-field">
              <label>DNI del Deudo</label>
              <span th:text="${solicitud.dniDeudo}">-</span>
            </div>
          </div>
          <div class="col-md-3">
            <div class="comprobante-field">
              <label>Parentesco</label>
              <span th:text="${solicitud.parentesco}">-</span>
            </div>
          </div>
          <div class="col-md-3">
            <div class="comprobante-field">
              <label>Fecha de Solicitud</label>
              <span th:text="${#temporals.format(solicitud.fechaSolicitud, 'dd/MM/yyyy')}">-</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="d-flex justify-content-end gap-3">
  <a th:href="@{/dashboard}" class="btn-sigs btn-sigs-secondary">
    <i class="bi bi-house-fill"></i> Ir al Dashboard
  </a>
  <a th:href="@{/expediente/nuevo(idSolicitud=${solicitud.idSolicitud})}"
     class="btn-sigs btn-sigs-primary">
    <i class="bi bi-arrow-right-circle-fill"></i> Continuar al Paso 2: Registrar Expediente
  </a>
</div>

<th:block th:insert="~{layout/footer}"></th:block>
</body>
</html>
