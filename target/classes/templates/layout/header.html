<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIGS — Sistema de Gestión de Expedientes de Fallecidos</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Custom Premium CSS -->
  <link th:href="@{/css/estilos.css}" rel="stylesheet"/>
  <th:block th:fragment="extraHead"></th:block>
</head>
<body>

<!-- Overlay para cerrar sidebar en móvil -->
<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;"></div>

<!-- Topbar móvil -->
<header class="topbar">
  <button id="btnMenuToggle" class="btn-menu-toggle" type="button" aria-label="Abrir menú">
    <i class="bi bi-list"></i>
  </button>
  <a href="/dashboard" class="topbar-brand">
    <i class="bi bi-building-fill-check me-2"></i>SIGS Cementerio
  </a>
</header>

<!-- Wrapper principal -->
<div class="sigs-wrapper">

  <!-- ── Sidebar ── -->
  <nav id="sidebar" class="sidebar" th:if="${#authentication != null and #authentication.authenticated}">
    <!-- Brand -->
    <a href="/dashboard" class="sidebar-brand">
      <div class="sidebar-brand-icon"><i class="bi bi-building-fill-check"></i></div>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-title">SIGS</div>
        <div class="sidebar-brand-sub">Área de Cementerio</div>
      </div>
    </a>

    <!-- Nav links -->
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Principal</div>
      <a th:href="@{/dashboard}" class="sidebar-link">
        <i class="bi bi-grid-1x2-fill"></i> Dashboard
      </a>

      <div class="sidebar-section-label">Expedientes</div>
      <a th:href="@{/solicitud/nueva}" class="sidebar-link">
        <i class="bi bi-file-earmark-plus-fill"></i> Nueva Solicitud
      </a>
      <a th:href="@{/consulta}" class="sidebar-link">
        <i class="bi bi-search"></i> Consultar Expedientes
      </a>

      <div sec:authorize="hasRole('admin')" class="sidebar-section-label">Administración</div>
      <a sec:authorize="hasRole('admin')" th:href="@{/reportes}" class="sidebar-link">
        <i class="bi bi-bar-chart-fill"></i> Reportes y Estadísticas
      </a>
    </nav>

    <!-- Footer con info del usuario -->
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar">
          <span sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
        </div>
        <div>
          <div class="sidebar-user-name" sec:authentication="name">usuario</div>
          <div class="sidebar-user-role" sec:authorize="hasRole('admin')">Admin</div>
          <div class="sidebar-user-role" sec:authorize="hasRole('operador')">Operador</div>
        </div>
      </div>
      <a href="/logout" class="btn-logout">
        <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
      </a>
    </div>
  </nav>

  <!-- ── Área de contenido ── -->
  <div class="content-area">
    <div class="page-content">
