<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="SIGS — Sistema de Gestión de Expedientes de Fallecidos. Iniciar sesión."/>
  <title>SIGS — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link th:href="@{/css/estilos.css}" rel="stylesheet"/>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Header del login -->
    <div class="login-header">
      <div class="login-logo">
        <i class="bi bi-building-fill-check"></i>
      </div>
      <h1 class="login-title">SIGS Cementerio</h1>
      <p class="login-subtitle">Sistema de Gestión de Expedientes de Fallecidos</p>
    </div>

    <!-- Body del login -->
    <div class="login-body">

      <!-- Mensaje de logout -->
      <div th:if="${message}" class="alert-sigs alert-info mb-3" role="alert">
        <i class="bi bi-info-circle-fill"></i>
        <span th:text="${message}"></span>
      </div>

      <!-- Mensaje de error -->
      <div th:if="${error}" class="alert-sigs alert-danger mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}"></span>
      </div>

      <!-- Formulario -->
      <form th:action="@{/login}" method="post">

        <div class="mb-3">
          <label for="username" class="form-label">
            <i class="bi bi-person me-1"></i> Usuario
          </label>
          <input type="text" id="username" name="username"
                 class="form-control form-control-lg"
                 placeholder="Ingrese su usuario"
                 autocomplete="username" required autofocus/>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="bi bi-lock me-1"></i> Contraseña
          </label>
          <input type="password" id="password" name="password"
                 class="form-control form-control-lg"
                 placeholder="Ingrese su contraseña"
                 autocomplete="current-password" required/>
        </div>

        <button type="submit" class="btn-sigs btn-sigs-primary w-100 py-3 justify-content-center" style="font-size:.95rem;">
          <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
        </button>

      </form>

      <p class="text-center mt-4 mb-0" style="font-size:.75rem; color:#718096;">
        Municipalidad &mdash; Área de Cementerio &copy; 2026
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
